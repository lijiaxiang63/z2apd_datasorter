name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Bundle binaries into app
        run: |
          APP_RESOURCES="build/macos/Build/Products/Release/z2apd_datasorter.app/Contents/Resources"
          cp dependency/dcm2niix "$APP_RESOURCES/"
          cp dependency/7zz "$APP_RESOURCES/"
          chmod +x "$APP_RESOURCES/dcm2niix" "$APP_RESOURCES/7zz"

      - name: Create ZIP
        run: |
          cd build/macos/Build/Products/Release
          zip -r -y z2apd_datasorter-macos.zip z2apd_datasorter.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/z2apd_datasorter-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Bundle binaries into build
        run: |
          Copy-Item -Path "dependency\dcm2niix.exe" -Destination "build\windows\x64\runner\Release\"
          Copy-Item -Path "dependency\7za.exe" -Destination "build\windows\x64\runner\Release\"
          Copy-Item -Path "dependency\7za.dll" -Destination "build\windows\x64\runner\Release\"
          Copy-Item -Path "dependency\7zxa.dll" -Destination "build\windows\x64\runner\Release\"

      - name: Create ZIP
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "z2apd_datasorter-windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: z2apd_datasorter-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            z2apd_datasorter-macos.zip
            z2apd_datasorter-windows.zip
